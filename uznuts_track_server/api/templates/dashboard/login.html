<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f6f7fb;
        display: grid;
        place-items: center;
        height: 100vh;
      }
      .card {
        background: #fff;
        padding: 24px;
        border-radius: 12px;
        border: 1px solid #e4e7f0;
        box-shadow: 0 8px 24px rgba(21, 28, 64, 0.06);
        width: 340px;
      }
      h1 { margin-top: 0; }
      label { display: block; margin-bottom: 6px; color: #60657a; }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e4e7f0;
        border-radius: 8px;
        margin-bottom: 12px;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        background: #2f6fed;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-weight: 600;
      }
      .error { color: #c0392b; font-size: 14px; }
    </style>
  </head>
  <body>
    <form method="post" class="card">
      <h1>Вход</h1>
      {% csrf_token %}
      {% if form.errors %}
        <div class="error">Неверный логин или пароль</div>
      {% endif %}
      <label for="id_username">Логин</label>
      {{ form.username }}
      <label for="id_password">Пароль</label>
      {{ form.password }}
      <button type="submit">Войти</button>
    </form>
  </body>
</html>
